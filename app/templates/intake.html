<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IASW Intake</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <section class="panel">
      <h1>IASW Intake</h1>
      <p>Submit a legal name change request for AI pre-verification before checker approval.</p>

      <form action="/intake" method="post" enctype="multipart/form-data" class="form-grid">
        <label>
          Customer ID
          <input type="text" name="customer_id" required />
        </label>
        <label>
          Old Name
          <input type="text" name="old_name" required />
        </label>
        <label>
          New Name
          <input type="text" name="new_name" required />
        </label>
        <label>
          Document
          <input type="file" name="document" required />
        </label>
        <button type="submit">Submit Request</button>
      </form>

      <p class="hint">Demo format: <code>Bride Name: ...</code> and <code>Married Name: ...</code></p>
      <p><a href="/checker">Go to Checker Queue</a></p>
    </section>
  </main>
</body>
</html>
